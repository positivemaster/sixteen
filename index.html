<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sixteen - 掌控每天的16小时</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #333;
    }

    /* 导航栏 */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      height: 126px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(252, 252, 252, 0);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      transition: background 0.3s, backdrop-filter 0.3s;
    }

    .navbar.scrolled {
      background: rgba(252, 252, 252, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 204px;
      height: 44px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 600;
      color: #333;
    }

    .download-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #000;
      color: #fff;
      padding: 12px 24px;
      border-radius: 1000px;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.3s;
    }

    .download-btn:hover {
      background: #333;
    }

    .download-btn svg {
      width: 20px;
      height: 20px;
    }

    /* 首屏 */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 126px 20px 60px;
      overflow: hidden;
    }

    /* 图片容器 */
    .floating-images {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .floating-image {
      position: absolute;
      width: 150px;
      height: 150px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .floating-image:hover {
      transform: scale(1.08) rotate(0deg) !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      z-index: 10;
    }

    .floating-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
    }

    /* 蒙层 */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.95);
      z-index: 200;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .overlay.active {
      display: flex;
    }

    .overlay-content {
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 90vw;
      max-height: 90vh;
    }

    .overlay-image {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }

    .floating-image:nth-child(1) {
      top: calc(15% + 60px);
      left: 22%;
      transform: rotate(-5deg);
    }

    .floating-image:nth-child(2) {
      top: calc(12% + 90px);
      left: 42%;
      transform: rotate(3deg);
    }

    .floating-image:nth-child(3) {
      top: calc(15% + 60px);
      right: 22%;
      transform: rotate(5deg);
    }

    .floating-image:nth-child(4) {
      top: calc(45% + 60px);
      left: 18%;
      transform: rotate(-8deg);
    }

    .floating-image:nth-child(5) {
      top: calc(50% + 60px);
      right: 18%;
      transform: rotate(8deg);
    }

    /* 主标题 */
    .hero-content {
      text-align: center;
      z-index: 10;
      margin-top: 210px;
    }

    .hero-title {
      font-size: 48px;
      font-weight: 700;
      color: #333;
      margin-bottom: 16px;
    }

    .hero-subtitle {
      font-size: 20px;
      color: #999;
      font-weight: 300;
    }

    /* 向下箭头 */
    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      animation: bounce 2s infinite;
      opacity: 1;
      transition: opacity 0.3s;
    }

    .scroll-indicator.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .scroll-indicator svg {
      width: 24px;
      height: 24px;
      color: #999;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      40% {
        transform: translateX(-50%) translateY(-10px);
      }
      60% {
        transform: translateX(-50%) translateY(-5px);
      }
    }

    /* 第二屏 */
    .section-features {
      background: #FCFCFC;
      min-height: 100vh;
      padding: 0 96px 80px 96px;
    }

    /* 功能标签导航 */
    .feature-tabs {
      display: flex;
      justify-content: center;
      gap: 80px;
      padding: 40px 0;
      border-bottom: 1px solid #eee;
      background: #fff;
      margin: 0 -96px;
      padding-left: 96px;
      padding-right: 96px;
    }

    .feature-tab {
      font-size: 18px;
      color: #333;
      text-decoration: none;
      padding: 16px 0;
      position: relative;
      transition: color 0.3s;
      cursor: pointer;
    }

    .feature-tab:hover {
      color: #000;
    }

    .feature-tab.active {
      font-weight: 600;
    }

    .feature-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: #333;
    }

    /* 功能内容区 */
    .feature-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px 0;
      padding-left: 104px;
      gap: 57px;
    }

    .feature-text {
      flex-shrink: 0;
      width: 576px;
    }

    .feature-text h2 {
      width: 576px;
      height: 67px;
      font-size: 42px;
      font-weight: 700;
      color: #333;
      margin-bottom: 40px;
      line-height: 67px;
    }

    .feature-text-content {
      width: 576px;
      height: 126px;
    }

    .feature-text p {
      font-size: 18px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 8px;
    }

    .feature-image {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .feature-image img {
      max-width: 100%;
      height: auto;
    }

    /* 页脚 */
    .footer {
      background: #FCFCFC;
      padding: 40px;
      border-top: 1px solid #eee;
      font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .footer-left {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .footer-qrcode {
      width: 80px;
      height: 80px;
      background: #eee;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #999;
    }

    .footer-qrcode-text {
      font-size: 14px;
      color: #999;
      margin-top: 8px;
    }

    .footer-slogan {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #666;
      margin-top: 20px;
    }

    .footer-slogan .icon {
      width: 20px;
      height: 20px;
    }

    .footer-right {
      text-align: right;
      font-size: 14px;
      color: #666;
      line-height: 2;
    }

    .footer-right a {
      color: #666;
      text-decoration: none;
      margin-left: 16px;
    }

    .footer-right a:hover {
      color: #333;
    }

    .footer-links {
      margin-top: 8px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 32px;
      }

      .hero-subtitle {
        font-size: 16px;
      }

      .floating-image {
        width: 100px;
        height: 100px;
      }

      .navbar {
        padding: 0 20px;
        height: 80px;
      }

      .hero {
        padding-top: 80px;
      }

      .section-features {
        padding: 0 20px 80px 20px;
      }

      .feature-tabs {
        gap: 20px;
        padding: 20px;
        margin: 0 -20px;
        overflow-x: auto;
      }

      .feature-tab {
        font-size: 14px;
        white-space: nowrap;
      }

      .feature-content {
        flex-direction: column;
        padding: 40px 0;
        padding-left: 0;
      }

      .feature-text {
        width: 100%;
      }

      .feature-text h2 {
        width: 100%;
        height: auto;
        font-size: 28px;
        line-height: 1.3;
      }

      .feature-text-content {
        width: 100%;
        height: auto;
      }

      .feature-image {
        width: 100%;
      }

      .feature-image img {
        width: 100%;
      }

      .footer-content {
        flex-direction: column;
        gap: 30px;
      }

      .footer-right {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="logo">
      <div class="logo-icon">
        <img src="素材/icon.png" alt="Sixteen">
      </div>
      <span class="logo-text">sixteen</span>
    </div>
    <a href="#" class="download-btn">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      AppStore下载
    </a>
  </nav>

  <!-- 首屏 -->
  <section class="hero">
    <!-- 漂浮图片 -->
    <div class="floating-images">
      <div class="floating-image" data-detail="素材/饮食1detail.png">
        <img src="素材/饮食1.png" alt="饮食">
      </div>
      <div class="floating-image" data-detail="素材/饮食2detail.png">
        <img src="素材/饮食2.png" alt="饮食">
      </div>
      <div class="floating-image" data-detail="素材/饮食3detail.png">
        <img src="素材/饮食3.png" alt="饮食">
      </div>
      <div class="floating-image" data-detail="素材/饮食4detail.png">
        <img src="素材/饮食4.png" alt="饮食">
      </div>
      <div class="floating-image" data-detail="素材/运动detail.png">
        <img src="素材/运动.png" alt="运动">
      </div>
    </div>

    <!-- 主内容 -->
    <div class="hero-content">
      <h1 class="hero-title">掌控每天的16小时</h1>
      <p class="hero-subtitle">让每一步改变都科学可见</p>
    </div>

    <!-- 向下滚动指示 -->
    <div class="scroll-indicator" id="scroll-indicator">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M7 10l5 5 5-5"/>
      </svg>
    </div>
  </section>

  <!-- 第二屏 -->
  <section class="section-features">
    <!-- 功能标签 -->
    <div class="feature-tabs">
      <span class="feature-tab active" data-tab="diet">饮食记录</span>
      <span class="feature-tab" data-tab="exercise">运动跟练</span>
      <span class="feature-tab" data-tab="coach">AI 教练</span>
      <span class="feature-tab" data-tab="evaluate">智能评估</span>
    </div>

    <!-- 功能内容 -->
    <div class="feature-content">
      <div class="feature-text">
        <h2 id="feature-title">拍照记录 营养看得见</h2>
        <div class="feature-text-content">
          <p id="feature-p1">随手拍一张，快速识别食物，分析热量与营养成分。</p>
          <p id="feature-p2">支持拍照、图片识别和文字描述，让记录变得轻松简单。</p>
          <p id="feature-p3">一键抠图生成趣味贴纸，让饮食清晰可见。</p>
        </div>
      </div>
      <div class="feature-image">
        <img id="feature-img" src="素材/record.png" alt="功能展示">
      </div>
    </div>
  </section>

  <!-- 蒙层 -->
  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <img class="overlay-image" id="overlay-image" src="" alt="">
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-left">
        <div>
          <div class="footer-qrcode">
            <img src="素材/qrcode.png" alt="二维码" onerror="this.parentElement.innerHTML='二维码';" style="width:100%;height:100%;">
          </div>
          <p class="footer-qrcode-text">扫码下载使用</p>
        </div>
        <div class="footer-slogan">
          <img src="素材/icon.png" alt="" class="icon">
          记录追逐健康生活的每一刻
        </div>
      </div>
      <div class="footer-right">
        <p>© 开若图科技（上海）有限公司</p>
        <p>联系我们 <a href="#">小红书</a> <a href="mailto:Support@mindback.chat">Support@mindback.chat</a></p>
        <div class="footer-links">
          <a href="#">隐私政策</a>
          <a href="#">服务条款</a>
        </div>
        <p>沪ICP备 2025136576号-13A</p>
      </div>
    </div>
  </footer>

  <script>
    // 导航栏滚动效果 & 箭头隐藏
    const navbar = document.getElementById('navbar');
    const scrollIndicator = document.getElementById('scroll-indicator');
    const heroSection = document.querySelector('.hero');

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const heroHeight = heroSection.offsetHeight;

      // 导航栏渐变
      if (scrollY <= 40) {
        const opacity = scrollY / 40;
        navbar.style.background = `rgba(252, 252, 252, ${0.8 * opacity})`;
        navbar.style.backdropFilter = `blur(${16 * opacity}px)`;
        navbar.style.webkitBackdropFilter = `blur(${16 * opacity}px)`;
      } else {
        navbar.style.background = 'rgba(252, 252, 252, 0.8)';
        navbar.style.backdropFilter = 'blur(16px)';
        navbar.style.webkitBackdropFilter = 'blur(16px)';
      }

      // 滚动到第二屏时隐藏箭头
      if (scrollY > heroHeight - 200) {
        scrollIndicator.classList.add('hidden');
      } else {
        scrollIndicator.classList.remove('hidden');
      }
    });

    // 标签切换数据
    const featureData = {
      diet: {
        title: '拍照记录 营养看得见',
        p1: '随手拍一张，快速识别食物，分析热量与营养成分。',
        p2: '支持拍照、图片识别和文字描述，让记录变得轻松简单。',
        p3: '一键抠图生成趣味贴纸，让饮食清晰可见。',
        image: '素材/record.png'
      },
      exercise: {
        title: '随时随地 快速跟练',
        p1: '无论居家还是健身房，一键开始，想练就练。',
        p2: '遵循AI教练建议或者自定义你的训练组合，把控节奏。',
        p3: '核心部位训练视频，快速跟练。',
        image: '素材/exercise.png'
      },
      coach: {
        title: '运动饮食 有求必应',
        p1: '运动饮食有问必答，任何困惑即时响应。',
        p2: '融合专业理论与个人数据，提供精准可靠的建议。',
        p3: '记录每次互动与进步，智能调整引导方向。',
        image: '素材/助手.png'
      },
      evaluate: {
        title: '智能评估 路径清晰',
        p1: '基于身体状况与运动表现，生成个性化评估报告。',
        p2: '量身打造饮食与运动方案，目标导向直达预期。',
        p3: '持续追踪优化，让健康进阶清晰可见。',
        image: '素材/评估.png'
      }
    };

    // 标签切换功能
    const tabs = document.querySelectorAll('.feature-tab');
    const titleEl = document.getElementById('feature-title');
    const p1El = document.getElementById('feature-p1');
    const p2El = document.getElementById('feature-p2');
    const p3El = document.getElementById('feature-p3');
    const featureImg = document.getElementById('feature-img');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        // 移除所有active状态
        tabs.forEach(t => t.classList.remove('active'));
        // 添加当前active状态
        tab.classList.add('active');

        // 获取对应数据
        const tabKey = tab.dataset.tab;
        const data = featureData[tabKey];

        // 更新内容
        titleEl.textContent = data.title;
        p1El.textContent = data.p1;
        p2El.textContent = data.p2;
        p3El.textContent = data.p3;

        // 更新图片
        featureImg.src = data.image;
      });
    });

    // 蒙层功能
    const overlay = document.getElementById('overlay');
    const overlayImage = document.getElementById('overlay-image');
    const floatingImages = document.querySelectorAll('.floating-image');

    floatingImages.forEach(item => {
      item.addEventListener('click', () => {
        const detailSrc = item.dataset.detail;
        overlayImage.src = detailSrc;
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      });
    });

    // 点击蒙层关闭
    overlay.addEventListener('click', () => {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    });
  </script>
</body>
</html>
